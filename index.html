<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <title>My WebAR</title>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <a-asset-item id="model" src="./assets/model.glb"></a-asset-item>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-gltf-model
        src="#model"
        position="0 0 0"
        rotation="90 90 90"
        scale="0.5 0.5 0.5">
      </a-gltf-model>

    </a-entity>

  </a-scene>
</body>
</html>
